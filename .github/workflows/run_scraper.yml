name: Auto Update IPTV Playlist

on:
  schedule:
    # يعمل تلقائياً كل 6 ساعات (يمكنك تعديل الوقت كما تشاء عبر نظام Cron)
    - cron: '0 */6 * * *'
  workflow_dispatch: # يتيح لك تشغيل السكريبت يدوياً في أي وقت بضغطة زر

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install selenium webdriver-manager

    - name: Run Scraper Script
      run: python scraper.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add match_page_text.txt
        git commit -m "🔄 Update match page visible text" || echo "No changes to commit"
        git push

